name: Bug report
description: Report something that isn't working as expected
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search [existing issues](https://github.com/infynno-solutions/loadwhiz/issues) first.

        **Do not use this form for security vulnerabilities** — see [SECURITY.md](https://github.com/infynno-solutions/loadwhiz/blob/main/SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start stack with `bun run dev:stack`
        2. Go to '...'
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Git SHA, tag, or "main" as of date
      placeholder: e.g. abc1234 or v0.1.0
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web app
        - API
        - Celery / workers
        - Database / migrations
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Bun/Python versions, Docker yes/no
      placeholder: |
        OS: Ubuntu 24.04
        Bun: 1.3.10
        Python: 3.13
        Docker: yes
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets. Paste relevant API logs, browser console, or Celery output.

  - type: checkboxes
    id: terms
    attributes:
      label: ""
      options:
        - label: I have redacted tokens, passwords, and personal data from this report
          required: true
