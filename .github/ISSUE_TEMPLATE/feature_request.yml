name: Feature request
description: Suggest an idea for LoadWhiz
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve and how a feature would help.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point or use case is missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or tools you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Load tests / k6
        - Host verification
        - Organizations / auth
        - UI / UX
        - API
        - DevOps / self-hosting
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this feature
          required: false
